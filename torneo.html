<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del torneo</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; }
    .container { max-width:1000px; margin:auto; padding:20px; }
    .box { background:#fff; padding:16px; border-radius:8px; margin-bottom:16px; }
    table { width:100%; border-collapse:collapse; background:#fff; }
    th, td { padding:8px; border-bottom:1px solid #ddd; text-align:center; }
    th { background:#1e7d3b; color:#fff; }
    .error { color:#b00020; font-weight:bold; white-space:pre-wrap; }
    .ok { color:#1e7d3b; font-weight:bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <a href="./">← Volver</a>
      <h1 id="titulo">Detalle del torneo</h1>
      <div id="estado">Iniciando...</div>
    </div>
    <div id="contenido"></div>
  </div>

  <script>
    const estado = document.getElementById("estado");
    const contenido = document.getElementById("contenido");
    const titulo = document.getElementById("titulo");

    const params = new URLSearchParams(window.location.search);
    const idBuscado = decodeURIComponent((params.get("id") || "").trim());

    estado.innerHTML = '<span class="ok">ID recibido:</span> ' + idBuscado;

    if (!idBuscado) {
      estado.innerHTML = '<div class="error">No llegó ningún ID en la URL.</div>';
    } else {
      fetch('./RESULTADOS.csv?v=' + Date.now())
        .then(res => {
          if (!res.ok) throw new Error('No se pudo abrir RESULTADOS.csv. HTTP ' + res.status);
          return res.text();
        })
        .then(texto => {
          texto = texto.replace(/\r/g, '');
          const filas = texto.split('\n');
          if (filas.length < 2) throw new Error('RESULTADOS.csv parece vacío o sin filas.');

          filas.shift();

          let encontrados = [];
          let nombreTorneo = '';
          let modalidad = '';
          let fecha = '';

          for (const fila of filas) {
            if (!fila.trim()) continue;
            const col = fila.split(';');
            const id = (col[0] || '').trim();

            if (id === idBuscado) {
              encontrados.push({
                categoria: (col[4] || '').trim(),
                jugador: (col[6] || '').trim(),
                gross: (col[10] || '').trim(),
                hcp: (col[11] || '').trim(),
                neto: (col[12] || '').trim(),
                total: (col[13] || '').trim()
              });

              fecha = (col[1] || '').trim();
              nombreTorneo = (col[2] || '').trim();
              modalidad = (col[3] || '').trim();
            }
          }

          if (encontrados.length === 0) {
            throw new Error('No encontré filas para este ID: ' + idBuscado);
          }

          titulo.textContent = nombreTorneo + ' - ' + modalidad;
          estado.innerHTML = '<span class="ok">Fecha:</span> ' + fecha + ' | <span class="ok">Filas encontradas:</span> ' + encontrados.length;

          let html = '<table><tr><th>Categoría</th><th>Jugador</th><th>Gross</th><th>Hcp</th><th>Neto</th><th>Total</th></tr>';

          for (const j of encontrados) {
            html += `<tr>
              <td>${j.categoria}</td>
              <td>${j.jugador}</td>
              <td>${j.gross}</td>
              <td>${j.hcp}</td>
              <td>${j.neto}</td>
              <td>${j.total}</td>
            </tr>`;
          }

          html += '</table>';
          contenido.innerHTML = html;
        })
        .catch(err => {
          estado.innerHTML = '<div class="error">Error: ' + err.message + '</div>';
        });
    }
  </script>
</body>
</html>
