<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultados</title>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
.container {max-width:1000px; margin:auto; padding:20px;}
h2 {margin-top:30px;}

table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td {
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th {
    background:#1e7d3b;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h1 id="titulo"></h1>
<div id="contenido"></div>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let idBuscado = params.get("id");

fetch('RESULTADOS.csv')
.then(res => res.text())
.then(data => {

    let filas = data.split('\n').slice(1);
    let categorias = {};

    filas.forEach(fila => {
        let col = fila.split(';');
        let id = col[0];

        if(id === idBuscado){

            let categoria = col[4];

            if(!categorias[categoria]){
                categorias[categoria] = [];
            }

            categorias[categoria].push({
                jugador: col[6],
                gross: col[10],
                hcp: col[11],
                neto: col[12],
                total: col[13]
            });

            document.getElementById('titulo').innerText = col[2] + " - " + col[3];
        }
    });

    let html = '';

    for(let cat in categorias){

        html += `<h2>${cat}</h2>`;
        html += `<table>
        <tr>
            <th>Jugador</th>
            <th>Gross</th>
            <th>Hcp</th>
            <th>Neto</th>
            <th>Total</th>
        </tr>`;

        categorias[cat].forEach(j => {
            html += `
            <tr>
                <td>${j.jugador}</td>
                <td>${j.gross}</td>
                <td>${j.hcp}</td>
                <td>${j.neto}</td>
                <td>${j.total}</td>
            </tr>`;
        });

        html += `</table>`;
    }

    document.getElementById('contenido').innerHTML = html;

});
</script>

</body>
</html>
