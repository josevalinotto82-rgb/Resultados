<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados del torneo</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #166534;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .club-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .escudo {
      height: 56px;
      width: auto;
      display: block;
    }

    .club-name {
      margin: 0;
      font-size: 22px;
      color: #3e5740;
      line-height: 1.1;
    }

    .titulo {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitulo {
      color: #6b7280;
      font-size: 15px;
      margin: 0;
    }

    .categoria {
      margin-top: 26px;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .tabla-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #166534;
      color: white;
      position: sticky;
      top: 0;
    }

    td.nombre {
      text-align: left;
      font-weight: 600;
    }

    tr.novalido td {
      color: #6b7280;
    }

    tr.match td {
      background: #dff3e4;
      font-weight: 700;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 700px) {
      .titulo {
        font-size: 22px;
      }

      .club-name {
        font-size: 20px;
      }

      .escudo {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="./index.html">← Volver a torneos</a>

    <div class="card">
      <div class="club-row">
        <img src="escudo.png" alt="Escudo Villa María Golf" class="escudo">
        <h1 class="club-name">Villa María Golf</h1>
      </div>

      <h1 id="titulo" class="titulo">Cargando...</h1>
      <p id="subtitulo" class="subtitulo"></p>
    </div>

    <div id="contenido"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const idBuscado = (params.get("id") || "").trim();
    const busquedaJugador = params.get("q") || "";

    const MODALIDADES_PAREJA = ["FOUR BALL AMERICANA", "FOUR BALL 3/8"];

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[,.;:()]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function coincideBusquedaJugador(nombreJugador, busqueda) {
      const palabras = normalizarTexto(busqueda).split(" ").filter(Boolean);
      const nombre = normalizarTexto(nombreJugador);

      if (palabras.length === 0) return false;

      return palabras.every(p => nombre.includes(p));
    }

    function parseNumero(valor) {
      if (valor === undefined || valor === null) return null;
      const limpio = String(valor).trim().replace(",", ".");
      if (limpio === "" || limpio.toUpperCase() === "NPT" || limpio.toUpperCase() === "DESC") return null;
      const n = Number(limpio);
      return Number.isNaN(n) ? null : n;
    }

    function esNoValido(total) {
      const t = String(total || "").trim().toUpperCase().replace(",", ".");
      return t === "NPT" || t === "DESC" || t === "" || t === "0" || t === "0.0" || t === "0.00";
    }

    function esModalidadPareja(modalidad) {
      return MODALIDADES_PAREJA.includes(String(modalidad || "").trim().toUpperCase());
    }

    function agruparParejasConsecutivas(jugadores) {
      const salida = [];

      for (let i = 0; i < jugadores.length; i += 2) {
        const j1 = jugadores[i];
        const j2 = jugadores[i + 1];

        if (!j2) {
          salida.push(j1);
          continue;
        }

        salida.push({
          ID: j2.ID || j1.ID,
          FECHA: j2.FECHA || j1.FECHA,
          TORNEO: j2.TORNEO || j1.TORNEO,
          MODALIDAD: j2.MODALIDAD || j1.MODALIDAD,
          CATEGORIA: j2.CATEGORIA || j1.CATEGORIA,
          POSICION: j2.POSICION || j1.POSICION,
          JUGADOR: `${j1.JUGADOR} / ${j2.JUGADOR}`,
          INDEX: `${j1.INDEX || ""} / ${j2.INDEX || ""}`,
          NETO1: j2.NETO1 || j1.NETO1 || "",
          NETO2: j2.NETO2 || j1.NETO2 || "",
          GROSS: j2.GROSS || j1.GROSS || "",
          HCP: j2.HCP || j1.HCP || "",
          NETO: j2.NETO || j1.NETO || "",
          TOTAL: j2.TOTAL || j1.TOTAL || ""
        });
      }

      return salida;
    }

    fetch("./RESULTADOS.csv?v=" + Date.now())
      .then(r => {
        if (!r.ok) throw new Error("No se pudo abrir RESULTADOS.csv");
        return r.text();
      })
      .then(texto => {
        const filas = texto.replace(/\r/g, "").trim().split("\n");
        filas.shift();

        const registros = filas
          .filter(f => f.trim() !== "")
          .map(f => {
            const c = f.split(";");
            return {
              ID: (c[0] || "").trim(),
              FECHA: (c[1] || "").trim(),
              TORNEO: (c[2] || "").trim(),
              MODALIDAD: (c[3] || "").trim(),
              CATEGORIA: (c[4] || "").trim(),
              POSICION: (c[5] || "").trim(),
              JUGADOR: (c[6] || "").trim(),
              INDEX: (c[7] || "").trim(),
              NETO1: (c[8] || "").trim(),
              NETO2: (c[9] || "").trim(),
              GROSS: (c[10] || "").trim(),
              HCP: (c[11] || "").trim(),
              NETO: (c[12] || "").trim(),
              TOTAL: (c[13] || "").trim()
            };
          })
          .filter(r => r.ID === idBuscado);

        if (registros.length === 0) {
          document.getElementById("titulo").textContent = "Torneo no encontrado";
          document.getElementById("subtitulo").textContent = "";
          document.getElementById("contenido").innerHTML = `<div class="empty">No hay datos para mostrar.</div>`;
          return;
        }

        const primero = registros[0];
        document.getElementById("titulo").textContent = primero.TORNEO;
        document.getElementById("subtitulo").textContent = `${primero.FECHA} · ${primero.MODALIDAD}`;

        const categorias = {};
        registros.forEach(r => {
          const cat = r.CATEGORIA || "Sin categoría";
          if (!categorias[cat]) categorias[cat] = [];
          categorias[cat].push(r);
        });

        let html = "";

        Object.keys(categorias).forEach(cat => {
          let jugadores = categorias[cat];

          if (esModalidadPareja(primero.MODALIDAD)) {
            jugadores = agruparParejasConsecutivas(jugadores);
          }

          let listaFinal = [];

          if (esModalidadPareja(primero.MODALIDAD)) {
            listaFinal = jugadores.slice().sort((a, b) => {
              const aInvalido = esNoValido(a.TOTAL) ? 1 : 0;
              const bInvalido = esNoValido(b.TOTAL) ? 1 : 0;
              return aInvalido - bInvalido;
            });
          } else {
            const validos = jugadores.filter(j => !esNoValido(j.TOTAL));
            const noValidos = jugadores.filter(j => esNoValido(j.TOTAL));

            validos.sort((a, b) => {
              const ta = parseNumero(a.TOTAL);
              const tb = parseNumero(b.TOTAL);
              if (ta === null && tb === null) return 0;
              if (ta === null) return 1;
              if (tb === null) return -1;
              return ta - tb;
            });

            listaFinal = [...validos, ...noValidos];
          }

          html += `<h2 class="categoria">${cat}</h2>`;
          html += `
            <div class="tabla-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>Index</th>
                    <th>Neto 1</th>
                    <th>Neto 2</th>
                    <th>Gross</th>
                    <th>HCP</th>
                    <th>Neto</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
          `;

          let posicion = 1;

          listaFinal.forEach(j => {
            const invalido = esNoValido(j.TOTAL);
            const posMostrar = invalido ? "" : (j.POSICION || posicion++);
            const esMatch = coincideBusquedaJugador(j.JUGADOR, busquedaJugador);

            html += `
              <tr class="${invalido ? 'novalido' : ''} ${esMatch ? 'match' : ''}">
                <td>${posMostrar}</td>
                <td class="nombre">${j.JUGADOR}</td>
                <td>${j.INDEX}</td>
                <td>${j.NETO1}</td>
                <td>${j.NETO2}</td>
                <td>${j.GROSS}</td>
                <td>${j.HCP}</td>
                <td>${j.NETO}</td>
                <td>${j.TOTAL}</td>
              </tr>
            `;
          });

          html += `
                </tbody>
              </table>
            </div>
          `;
        });

        document.getElementById("contenido").innerHTML = html;
      })
      .catch(err => {
        document.getElementById("titulo").textContent = "Error";
        document.getElementById("subtitulo").textContent = err.message;
        document.getElementById("contenido").innerHTML = `<div class="empty">No se pudieron cargar los resultados.</div>`;
      });
  </script>
</body>
</html>
