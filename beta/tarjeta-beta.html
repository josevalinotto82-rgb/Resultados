<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta del jugador - Beta</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1250px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #166534;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .club-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .escudo {
      height: 56px;
      width: auto;
      display: block;
    }

    .club-name {
      margin: 0;
      font-size: 22px;
      color: #3e5740;
      line-height: 1.1;
    }

    .beta-badge {
      display: inline-block;
      margin-top: 6px;
      background: #166534;
      color: white;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .titulo {
      margin: 0 0 8px;
      font-size: 30px;
      text-transform: uppercase;
    }

    .subtitulo {
      color: #111827;
      font-size: 15px;
      margin: 0;
      font-weight: 700;
    }

    .meta-top {
      margin-top: 6px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .datos-linea {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 15px;
      color: #374151;
      margin-top: 12px;
    }

    .puesto-badge {
      display: inline-block;
      background: #166534; /* verde golf 😏 */
      color: #f5e7b3;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }

    .datos-linea strong {
      color: #111827;
    }

    .tabla-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #166534;
      color: white;
    }

    td.label {
      text-align: left;
      font-weight: 700;
      background: #f8fafc;
      position: sticky;
      left: 0;
      z-index: 1;
      min-width: 72px;
    }

    tr.row-par td,
    tr.row-hcp td {
      background: #f3f4f6;
      padding-top: 6px;
      padding-bottom: 6px;
      font-size: 13px;
    }

    tr.row-score td {
      background: white;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    tr.row-score td.label {
      background: white;
    }

    .resaltado {
      background: #ecfdf5;
      font-weight: 700;
    }

    .row-par .resaltado,
    .row-hcp .resaltado {
      background: #e5e7eb;
    }

    .score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 8px;
      font-weight: 700;
      line-height: 1;
      color: #1f2937;
      background: white;
    }

    .par {
      border: none;
    }

    .birdie {
      border: 2px solid #166534;
      border-radius: 50%;
    }

    .eagle {
      border: 5px double #166534;
      border-radius: 50%;
    }

    .bogey {
      border: 2px solid #b45309;
      border-radius: 6px;
    }

    .double-bogey {
      border: 5px double #b45309;
      border-radius: 8px;
    }

    .leyenda,
    .desempate-box {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .leyenda h3,
    .desempate-box h3 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .leyenda-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .leyenda-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
    }

    .leyenda .score {
      min-width: 28px;
      height: 28px;
      font-size: 12px;
      padding: 0 6px;
    }

    .desempate-linea {
      margin-bottom: 8px;
      font-size: 15px;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 900px) {
      .titulo {
        font-size: 24px;
      }

      .club-name {
        font-size: 20px;
      }

      .escudo {
        height: 50px;
      }

      .leyenda-grid {
        grid-template-columns: 1fr 1fr;
      }

      table {
        min-width: 920px;
      }

      th, td {
        font-size: 12px;
        padding: 7px 5px;
      }

      td.label {
        min-width: 62px;
      }

      .score {
        min-width: 28px;
        height: 28px;
        padding: 0 5px;
        font-size: 12px;
      }

      tr.row-par td,
      tr.row-hcp td {
        padding-top: 4px;
        padding-bottom: 4px;
        font-size: 11px;
      }

      tr.row-score td {
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .leyenda h3,
      .desempate-box h3 {
        font-size: 17px;
      }

      .leyenda-item {
        font-size: 13px;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 18px 10px 28px;
      }

      .titulo {
        font-size: 21px;
      }

      .subtitulo {
        font-size: 14px;
      }

      .meta-top {
        font-size: 13px;
      }

      .datos-linea {
        gap: 14px;
        font-size: 14px;
      }

      .leyenda-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a id="volverLink" class="back" href="./index-beta.html">← Volver</a>

    <div class="card">
      <div class="club-row">
        <img src="escudo-beta.png" alt="Escudo Villa María Golf" class="escudo">
        <div>
          <h1 class="club-name">Villa María Golf</h1>
          <span class="beta-badge">VERSIÓN BETA</span>
        </div>
      </div>

      <h1 id="titulo" class="titulo">Cargando tarjeta...</h1>
      <p id="subtitulo" class="subtitulo"></p>
      <div id="metaTop" class="meta-top"></div>
      <div id="datosLinea" class="datos-linea"></div>
    </div>

    <div id="desempateBox"></div>
    <div id="tarjetaBox"></div>

    <div class="leyenda">
      <h3>Referencia:</h3>
      <div class="leyenda-grid">
        <div class="leyenda-item"><span class="score par">4</span> <span>Par</span></div>
        <div class="leyenda-item"><span class="score birdie">3</span> <span>Birdie</span></div>
        <div class="leyenda-item"><span class="score eagle">2</span> <span>Albatros</span></div>
        <div class="leyenda-item"><span class="score bogey">5</span> <span>Bogey</span></div>
        <div class="leyenda-item"><span class="score double-bogey">6</span> <span>Doble Bogey o más</span></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const idBuscado = (params.get("id") || "").trim();
    const jugadorBuscado = (params.get("jugador") || "").trim();
    const categoriaBuscada = (params.get("categoria") || "").trim();

    const HOYOS = [
      { h: 1,  par: 4, hp: 15 },
      { h: 2,  par: 4, hp: 3  },
      { h: 3,  par: 3, hp: 5  },
      { h: 4,  par: 4, hp: 11 },
      { h: 5,  par: 3, hp: 9  },
      { h: 6,  par: 4, hp: 1  },
      { h: 7,  par: 4, hp: 13 },
      { h: 8,  par: 4, hp: 7  },
      { h: 9,  par: 5, hp: 17 },
      { h: 10, par: 4, hp: 8  },
      { h: 11, par: 3, hp: 14 },
      { h: 12, par: 5, hp: 10 },
      { h: 13, par: 3, hp: 2  },
      { h: 14, par: 4, hp: 16 },
      { h: 15, par: 4, hp: 18 },
      { h: 16, par: 4, hp: 6  },
      { h: 17, par: 5, hp: 12 },
      { h: 18, par: 4, hp: 4  }
    ];

    const PAR_IDA = 35;
    const PAR_VUELTA = 36;
    const PAR_TOTAL = 71;

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[,.;:()]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseNumero(valor) {
      if (valor === undefined || valor === null) return null;
      const limpio = String(valor).trim().replace(",", ".");
      if (limpio === "" || limpio.toUpperCase() === "NPT" || limpio.toUpperCase() === "DESC") return null;
      const n = Number(limpio);
      return Number.isNaN(n) ? null : n;
    }

    function n(valor) {
      const x = Number(String(valor || "").trim().replace(",", "."));
      return Number.isNaN(x) ? 0 : x;
    }

    function esNoValido(total) {
      const t = String(total || "").trim().toUpperCase().replace(",", ".");
      return t === "NPT" || t === "DESC" || t === "" || t === "0" || t === "0.0" || t === "0.00";
    }

    function sumaHoyos(jugador, desde, hasta) {
      let total = 0;
      for (let i = desde; i <= hasta; i++) {
        total += n(jugador["H" + i]);
      }
      return total;
    }

    function valorPrincipal(j) {
      const neto1 = parseNumero(j["NETO 1"]);
      const neto2 = parseNumero(j["NETO 2"]);
      const neto = parseNumero(j.NETO);
      const total = parseNumero(j.TOTAL);

      if (neto1 !== null) return neto1;
      if (neto2 !== null) return neto2;
      if (neto !== null) return neto;
      if (total !== null) return total;
      return 999999;
    }

    function tieneNetoParcial(j) {
      return String(j["NETO 1"] || "").trim() !== "" || String(j["NETO 2"] || "").trim() !== "";
    }

    function compararJugadores(a, b) {
      const aInvalido = esNoValido(a.TOTAL) ? 1 : 0;
      const bInvalido = esNoValido(b.TOTAL) ? 1 : 0;
      if (aInvalido !== bInvalido) return aInvalido - bInvalido;

      const aPrincipal = valorPrincipal(a);
      const bPrincipal = valorPrincipal(b);

      if (aPrincipal !== bPrincipal) return aPrincipal - bPrincipal;

      const aSinParciales = !tieneNetoParcial(a);
      const bSinParciales = !tieneNetoParcial(b);

      if (aSinParciales && bSinParciales) {
        const criterios = [
          [10, 18],
          [13, 18],
          [16, 18],
          [17, 18],
          [18, 18]
        ];

        for (const [desde, hasta] of criterios) {
          const sa = sumaHoyos(a, desde, hasta);
          const sb = sumaHoyos(b, desde, hasta);
          if (sa !== sb) return sa - sb;
        }
      }

      return normalizarTexto(a.JUGADOR).localeCompare(normalizarTexto(b.JUGADOR));
    }

    function obtenerDetalleDesempate(jugador, rivalesEmpatados) {
      if (!rivalesEmpatados || rivalesEmpatados.length === 0) return null;
      if (tieneNetoParcial(jugador)) return null;

      const criterios = [
        { desde: 10, hasta: 18, nombre: "Segunda vuelta" },
        { desde: 13, hasta: 18, nombre: "Últimos 6 hoyos" },
        { desde: 16, hasta: 18, nombre: "Últimos 3 hoyos" },
        { desde: 17, hasta: 18, nombre: "Últimos 2 hoyos" },
        { desde: 18, hasta: 18, nombre: "Último hoyo" }
      ];

      for (const rival of rivalesEmpatados) {
        const lineas = [];

        for (const c of criterios) {
          const miSuma = sumaHoyos(jugador, c.desde, c.hasta);
          const suSuma = sumaHoyos(rival, c.desde, c.hasta);

          lineas.push({
            nombre: c.nombre,
            jugador: miSuma,
            rival: suSuma,
            decisivo: miSuma !== suSuma
          });

          if (miSuma !== suSuma) {
            return {
              rival: rival.JUGADOR,
              lineas
            };
          }
        }
      }

      return null;
    }

    function claseScore(golpes, par) {
      const g = n(golpes);
      const diff = g - par;

      if (diff <= -2) return "eagle";
      if (diff === -1) return "birdie";
      if (diff === 0) return "par";
      if (diff === 1) return "bogey";
      return "double-bogey";
    }

    function htmlScore(golpes, par) {
      const valor = String(golpes || "").trim();
      if (!valor) return "";
      const clase = claseScore(valor, par);
      return `<span class="score ${clase}">${valor}</span>`;
    }

    function obtenerHdp(j) {
      return String(j.HP || j.HCP || "").trim();
    }

    function calcularPosicion(jugador, listaCategoriaOrdenada) {
      let posicion = 0;
      for (const item of listaCategoriaOrdenada) {
        if (esNoValido(item.TOTAL)) continue;
        posicion++;

        if (
          normalizarTexto(item.JUGADOR) === normalizarTexto(jugador.JUGADOR) &&
          normalizarTexto(item.CATEGORIA) === normalizarTexto(jugador.CATEGORIA)
        ) {
          return posicion;
        }
      }
      return "";
    }

    function construirDatosLinea(j, posicion) {
      document.getElementById("datosLinea").innerHTML = `
        <div class="puesto-badge">Puesto ${posicion || ""}</div>
        <div><strong>Index:</strong> ${j.INDEX || ""}</div>
        <div><strong>HDP:</strong> ${obtenerHdp(j)}</div>
        <div><strong>Neto:</strong> ${j.NETO || ""}</div>
      `;
    }

    function construirTarjeta(j) {
      const ida = sumaHoyos(j, 1, 9);
      const vuelta = sumaHoyos(j, 10, 18);
      const total = sumaHoyos(j, 1, 18);

      const html = `
        <div class="tabla-wrap">
          <table>
            <tbody>
              <tr>
                <td class="label">Hoyo</td>
                ${HOYOS.slice(0, 9).map(x => `<td>${x.h}</td>`).join("")}
                <td class="resaltado">IDA</td>
                ${HOYOS.slice(9).map(x => `<td>${x.h}</td>`).join("")}
                <td class="resaltado">VTA</td>
                <td class="resaltado">TOT</td>
              </tr>
              <tr class="row-par">
                <td class="label">Par</td>
                ${HOYOS.slice(0, 9).map(x => `<td>${x.par}</td>`).join("")}
                <td class="resaltado">${PAR_IDA}</td>
                ${HOYOS.slice(9).map(x => `<td>${x.par}</td>`).join("")}
                <td class="resaltado">${PAR_VUELTA}</td>
                <td class="resaltado">${PAR_TOTAL}</td>
              </tr>
              <tr class="row-hcp">
                <td class="label">HCP</td>
                ${HOYOS.slice(0, 9).map(x => `<td>${x.hp}</td>`).join("")}
                <td class="resaltado"></td>
                ${HOYOS.slice(9).map(x => `<td>${x.hp}</td>`).join("")}
                <td class="resaltado"></td>
                <td class="resaltado"></td>
              </tr>
              <tr class="row-score">
                <td class="label">Score</td>
                ${HOYOS.slice(0, 9).map(x => `<td>${htmlScore(j["H" + x.h], x.par)}</td>`).join("")}
                <td class="resaltado">${ida}</td>
                ${HOYOS.slice(9).map(x => `<td>${htmlScore(j["H" + x.h], x.par)}</td>`).join("")}
                <td class="resaltado">${vuelta}</td>
                <td class="resaltado">${total}</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;

      document.getElementById("tarjetaBox").innerHTML = html;
    }

    fetch("./RESULTADOS-BETA.csv?v=" + Date.now())
      .then(r => {
        if (!r.ok) throw new Error("No se pudo abrir RESULTADOS-BETA.csv");
        return r.text();
      })
      .then(texto => {
        const filas = texto.replace(/\r/g, "").trim().split("\n");
        const encabezados = filas.shift().split(";").map(x => x.trim());

        const registros = filas
          .filter(f => f.trim() !== "")
          .map(f => {
            const c = f.split(";");
            const obj = {};
            encabezados.forEach((h, i) => obj[h] = (c[i] || "").trim());
            return obj;
          })
          .filter(r => String(r.TORIDD || "").trim() === idBuscado);

        if (registros.length === 0) {
          document.getElementById("titulo").textContent = "Tarjeta no encontrada";
          document.getElementById("subtitulo").textContent = "";
          document.getElementById("metaTop").textContent = "";
          document.getElementById("tarjetaBox").innerHTML = `<div class="empty">No hay datos para mostrar.</div>`;
          return;
        }

        const categorias = {};
        registros.forEach(r => {
          const cat = r.CATEGORIA || "Sin categoría";
          if (!categorias[cat]) categorias[cat] = [];
          categorias[cat].push(r);
        });

        Object.keys(categorias).forEach(cat => {
          categorias[cat].sort(compararJugadores);
        });

        let jugador = registros.find(r =>
          normalizarTexto(r.JUGADOR) === normalizarTexto(jugadorBuscado) &&
          normalizarTexto(r.CATEGORIA) === normalizarTexto(categoriaBuscada)
        );

        if (!jugador) {
          jugador = registros.find(r => normalizarTexto(r.JUGADOR) === normalizarTexto(jugadorBuscado));
        }

        if (!jugador) {
          document.getElementById("titulo").textContent = "Jugador no encontrado";
          document.getElementById("subtitulo").textContent = "";
          document.getElementById("metaTop").textContent = "";
          document.getElementById("tarjetaBox").innerHTML = `<div class="empty">No se encontró la tarjeta del jugador.</div>`;
          return;
        }

        const categoriaLista = (categorias[jugador.CATEGORIA] || []).slice();
        const posicion = calcularPosicion(jugador, categoriaLista);

        document.getElementById("titulo").textContent = jugador.JUGADOR;
        document.getElementById("subtitulo").textContent = jugador.TORNEO;
        document.getElementById("metaTop").innerHTML = `
          <div><strong>Categoría:</strong> ${jugador.CATEGORIA || ""}</div>
          <div><strong>Fecha:</strong> ${jugador.FECHA || ""}</div>
        `;

        document.getElementById("volverLink").href =
          "./torneo-beta.html?id=" + encodeURIComponent(jugador.TORIDD || "");

        construirDatosLinea(jugador, posicion);
        construirTarjeta(jugador);

        const principal = valorPrincipal(jugador);

        const empatados = categoriaLista.filter(r =>
          normalizarTexto(r.JUGADOR) !== normalizarTexto(jugador.JUGADOR) &&
          valorPrincipal(r) === principal &&
          !esNoValido(r.TOTAL)
        );

        const detalleDesempate = obtenerDetalleDesempate(jugador, empatados);

        if (detalleDesempate) {
          document.getElementById("desempateBox").innerHTML = `
            <div class="desempate-box">
              <h3>Desempate automático</h3>
              <div class="desempate-linea"><strong>Empatado con:</strong> ${detalleDesempate.rival}</div>
              ${detalleDesempate.lineas.map(l => `
                <div class="desempate-linea">
                  ${l.decisivo ? "<strong>" : ""}
                  ${l.nombre}: ${l.jugador}
                  ${l.decisivo ? " ← criterio decisivo" : ""}
                  ${l.decisivo ? "</strong>" : ""}
                </div>
              `).join("")}
            </div>
          `;
        }
      })
      .catch(err => {
        document.getElementById("titulo").textContent = "Error";
        document.getElementById("subtitulo").textContent = err.message;
        document.getElementById("metaTop").textContent = "";
        document.getElementById("tarjetaBox").innerHTML = `<div class="empty">No se pudo cargar la tarjeta.</div>`;
      });
  </script>
</body>
</html>
