<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneos Beta - Villa María Golf</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: white;
      border-radius: 0 0 14px 14px;
      padding: 14px 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .hero-link {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
    }

    .hero-link:hover {
      opacity: 0.96;
    }

    .escudo {
      height: 56px;
      width: auto;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .escudo:hover {
      transform: scale(1.05);
    }

    .club-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      color: #3e5740;
    }

    .club-subtitle {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 15px;
    }

    .beta-badge {
      display: inline-block;
      margin-top: 8px;
      background: #166534;
      color: white;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tools input,
    .tools select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      color: #1f2937;
      outline: none;
    }

    .tools input:focus,
    .tools select:focus {
      border-color: #3e5740;
    }

    .status {
      margin-bottom: 16px;
      color: #6b7280;
      font-size: 14px;
    }

    .lista {
      display: grid;
      gap: 14px;
    }

    .torneo {
      background: white;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .torneo-info {
      min-width: 0;
      flex: 1;
    }

    .fecha {
      display: inline-block;
      font-size: 13px;
      color: #166534;
      background: #dcfce7;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .nombre {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .modalidad {
      color: #6b7280;
      font-size: 15px;
    }

    .ver-btn {
      border: none;
      background: #166534;
      color: white;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      font-size: 14px;
    }

    .ver-btn:hover {
      background: #14532d;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 920px) {
      .tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .container {
        padding: 0 12px 32px;
      }

      .hero {
        padding: 12px 14px;
      }

      .hero-link {
        gap: 12px;
      }

      .escudo {
        height: 50px;
      }

      .club-title {
        font-size: 21px;
      }

      .club-subtitle {
        font-size: 14px;
      }

      .torneo {
        flex-direction: column;
        align-items: stretch;
      }

      .ver-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="hero">
      <a href="https://villamariagolf.com.ar" target="_blank" class="hero-link">
        <img src="escudo-beta.png" alt="Escudo Villa María Golf" class="escudo">
        <div>
          <h1 class="club-title">Villa María Golf</h1>
          <p class="club-subtitle">Resultados de torneos</p>
          <span class="beta-badge">VERSIÓN BETA</span>
        </div>
      </a>
    </div>

    <div class="tools">
      <input type="text" id="buscador" placeholder="Buscar torneo o jugador...">
      <select id="filtroAnio">
        <option value="">Todos los años</option>
      </select>
      <select id="filtroDia">
        <option value="">Todos los días</option>
        <option value="0">Domingo</option>
        <option value="1">Lunes</option>
        <option value="2">Martes</option>
        <option value="3">Miércoles</option>
        <option value="4">Jueves</option>
        <option value="5">Viernes</option>
        <option value="6">Sábado</option>
      </select>
    </div>

    <div id="status" class="status">Cargando torneos...</div>
    <div id="lista" class="lista"></div>

  </div>

  <script>
    let torneos = [];
    let resultados = [];
    let jugadoresIndexados = [];

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[,.;:()]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function separarPalabras(texto) {
      return normalizarTexto(texto)
        .split(" ")
        .filter(Boolean);
    }

    function fechaAObjeto(fecha) {
      const texto = String(fecha || "").trim();
      if (!texto) return null;

      let dia, mes, anio;
      let m;

      // Formato: dd/mm/yyyy o d/m/yyyy
      m = texto.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if (m) {
        dia = Number(m[1]);
        mes = Number(m[2]) - 1;
        anio = Number(m[3]);
        if (anio < 100) anio += 2000;
      } else {
        // Formato: yyyy-mm-dd
        m = texto.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (!m) return null;

        anio = Number(m[1]);
        mes = Number(m[2]) - 1;
        dia = Number(m[3]);
      }

      const f = new Date(anio, mes, dia);

      if (
        Number.isNaN(f.getTime()) ||
        f.getFullYear() !== anio ||
        f.getMonth() !== mes ||
        f.getDate() !== dia
      ) {
        return null;
      }

      return f;
    }

    function formatearFecha(fecha) {
      const f = fechaAObjeto(fecha);
      if (!f) return String(fecha || "");

      const dd = String(f.getDate()).padStart(2, "0");
      const mm = String(f.getMonth() + 1).padStart(2, "0");
      const yyyy = String(f.getFullYear());

      return `${dd}/${mm}/${yyyy}`;
    }

    function extraerAnio(fecha) {
      const f = fechaAObjeto(fecha);
      return f ? String(f.getFullYear()) : "";
    }

    function obtenerDiaSemana(fecha) {
      const f = fechaAObjeto(fecha);
      if (!f) return "";
      return String(f.getDay());
    }

    function textoContador(cantidad) {
      return cantidad === 1
        ? "1 torneo encontrado"
        : `${cantidad} torneos encontrados`;
    }

    function construirIndiceJugadores() {
      const mapa = new Map();

      resultados.forEach(r => {
        const nombreOriginal = String(r.JUGADOR || "").trim();
        const nombreNormalizado = normalizarTexto(nombreOriginal);
        const id = r.TORIDD;

        if (!nombreNormalizado || !id) return;

        if (!mapa.has(nombreNormalizado)) {
          mapa.set(nombreNormalizado, {
            nombre: nombreNormalizado,
            ids: new Set()
          });
        }

        mapa.get(nombreNormalizado).ids.add(id);
      });

      jugadoresIndexados = Array.from(mapa.values());
    }

    function buscarIdsPorJugador(textoBusqueda) {
      const palabras = separarPalabras(textoBusqueda);
      const ids = new Set();

      if (palabras.length === 0) return ids;

      jugadoresIndexados.forEach(j => {
        const coincide = palabras.every(palabra => j.nombre.includes(palabra));
        if (coincide) {
          j.ids.forEach(id => ids.add(id));
        }
      });

      return ids;
    }

    function irATorneo(id) {
      const busqueda = document.getElementById("buscador").value || "";
      const url = "torneo-beta.html?id=" + encodeURIComponent(id) + "&q=" + encodeURIComponent(busqueda);
      window.location.href = url;
    }

    function renderTorneos() {
      const textoOriginal = document.getElementById("buscador").value;
      const texto = normalizarTexto(textoOriginal);
      const anio = document.getElementById("filtroAnio").value;
      const dia = document.getElementById("filtroDia").value;
      const lista = document.getElementById("lista");
      const status = document.getElementById("status");

      const idsJugador = buscarIdsPorJugador(texto);

      const filtrados = torneos.filter(t => {
        const torneoTexto = normalizarTexto(t.TORNEO);
        const modalidadTexto = normalizarTexto(t.MODALIDAD);
        const fechaTexto = normalizarTexto(t.FECHA);

        const coincideTextoDirecto =
          !texto ||
          torneoTexto.includes(texto) ||
          modalidadTexto.includes(texto) ||
          fechaTexto.includes(texto);

        const coincideJugador =
          !texto ||
          idsJugador.has(t.ID);

        const coincideBusqueda = !texto || coincideTextoDirecto || coincideJugador;
        const coincideAnio = !anio || extraerAnio(t.FECHA) === anio;
        const coincideDia = !dia || obtenerDiaSemana(t.FECHA) === dia;

        return coincideBusqueda && coincideAnio && coincideDia;
      });

      status.textContent = textoContador(filtrados.length);

      if (filtrados.length === 0) {
        lista.innerHTML = `<div class="empty">No se encontraron torneos con esos filtros.</div>`;
        return;
      }

      lista.innerHTML = filtrados.map(t => `
        <div class="torneo">
          <div class="torneo-info">
            <div class="fecha">${formatearFecha(t.FECHA)}</div>
            <div class="nombre">${t.TORNEO}</div>
            <div class="modalidad">${t.MODALIDAD}</div>
          </div>
          <button class="ver-btn" onclick="irATorneo('${String(t.ID).replace(/'/g, "\\'")}')">Ver resultados</button>
        </div>
      `).join("");
    }

    Promise.all([
      fetch("./INDEX-BETA.csv?v=" + Date.now()).then(r => {
        if (!r.ok) throw new Error("No se pudo abrir INDEX-BETA.csv");
        return r.text();
      }),
      fetch("./RESULTADOS-BETA.csv?v=" + Date.now()).then(r => {
        if (!r.ok) throw new Error("No se pudo abrir RESULTADOS-BETA.csv");
        return r.text();
      })
    ])
    .then(([indexTexto, resultadosTexto]) => {
      const filasIndex = indexTexto.replace(/\r/g, "").trim().split("\n");
      filasIndex.shift();

      torneos = filasIndex
        .filter(f => f.trim() !== "")
        .map(f => {
          const c = f.split(";");
          return {
            ID: (c[0] || "").trim(),
            FECHA: (c[1] || "").trim(),
            TORNEO: (c[2] || "").trim(),
            MODALIDAD: (c[3] || "").trim()
          };
        });

      torneos.sort((a, b) => {
        const da = fechaAObjeto(a.FECHA);
        const db = fechaAObjeto(b.FECHA);

        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;

        return db - da;
      });

      const filasResultados = resultadosTexto.replace(/\r/g, "").trim().split("\n");
      const encabezados = filasResultados.shift().split(";");

      resultados = filasResultados
        .filter(f => f.trim() !== "")
        .map(f => {
          const c = f.split(";");
          const obj = {};
          encabezados.forEach((h, i) => obj[h.trim()] = (c[i] || "").trim());
          return obj;
        });

      construirIndiceJugadores();

      const anios = [...new Set(torneos.map(t => extraerAnio(t.FECHA)).filter(Boolean))]
        .sort((a, b) => b.localeCompare(a));

      const filtroAnio = document.getElementById("filtroAnio");
      filtroAnio.innerHTML += anios.map(a => `<option value="${a}">${a}</option>`).join("");

      document.getElementById("buscador").addEventListener("input", renderTorneos);
      document.getElementById("filtroAnio").addEventListener("change", renderTorneos);
      document.getElementById("filtroDia").addEventListener("change", renderTorneos);

      renderTorneos();
    })
    .catch(err => {
      document.getElementById("status").textContent = "Error: " + err.message;
      document.getElementById("lista").innerHTML = `<div class="empty">No se pudieron cargar los torneos.</div>`;
    });
  </script>
</body>
</html>
