<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados del torneo - Beta</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
      color: #166534;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .club-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .escudo {
      height: 56px;
      width: auto;
      display: block;
    }

    .club-name {
      margin: 0;
      font-size: 22px;
      color: #3e5740;
      line-height: 1.1;
    }

    .beta-badge {
      display: inline-block;
      margin-top: 6px;
      background: #166534;
      color: white;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .titulo {
      margin: 0 0 8px;
      font-size: 28px;
      text-transform: uppercase;
    }

    .subtitulo {
      color: #6b7280;
      font-size: 15px;
      margin: 0;
    }

    .categoria {
      margin-top: 26px;
      margin-bottom: 10px;
      font-size: 20px;
    }

    .tabla-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 22px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #166534;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td.nombre {
      text-align: left;
      font-weight: 600;
    }

    .jugador-link {
      color: #1f2937;
      text-decoration: none;
      font-weight: 700;
    }

    .jugador-link:hover {
      color: #166534;
      text-decoration: underline;
    }

    tr.novalido td {
      color: #6b7280;
    }

    tr.match td {
      background: #dff3e4;
      font-weight: 700;
    }

    tr:nth-child(even):not(.match) td {
      background: #f8faf8;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .nota {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .debug {
      margin-top: 10px;
      padding: 10px 12px;
      background: #fff7ed;
      color: #9a3412;
      border-radius: 10px;
      font-size: 13px;
      white-space: pre-wrap;
    }

    @media (max-width: 700px) {
      .titulo { font-size: 22px; }
      .club-name { font-size: 20px; }
      .escudo { height: 50px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="./index-beta.html">← Volver a torneos</a>

    <div class="card">
      <div class="club-row">
        <img src="escudo-beta.png" alt="Escudo Villa María Golf" class="escudo" />
        <div>
          <h1 class="club-name">Villa María Golf</h1>
          <span class="beta-badge">VERSIÓN BETA</span>
        </div>
      </div>

      <h1 id="titulo" class="titulo">Cargando...</h1>
      <p id="subtitulo" class="subtitulo"></p>
      <p class="nota">Hacé clic sobre el nombre de un jugador para ver su tarjeta completa.</p>
      <div id="debug"></div>
    </div>

    <div id="contenido"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const idBuscado = (params.get("id") || "").trim();
    const busquedaJugador = params.get("q") || "";

    function mostrarDebug(msg) {
      const el = document.getElementById("debug");
      el.innerHTML = `<div class="debug">${msg}</div>`;
    }

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[,.;:()]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function coincideBusquedaJugador(nombreJugador, busqueda) {
      const palabras = normalizarTexto(busqueda).split(" ").filter(Boolean);
      const nombre = normalizarTexto(nombreJugador);
      if (palabras.length === 0) return false;
      return palabras.every(p => nombre.includes(p));
    }

    function parseNumero(valor) {
      if (valor === undefined || valor === null) return null;
      const limpio = String(valor).trim().replace(",", ".");
      if (limpio === "" || limpio.toUpperCase() === "NPT" || limpio.toUpperCase() === "DESC") return null;
      const n = Number(limpio);
      return Number.isNaN(n) ? null : n;
    }

    function n(valor) {
      const x = Number(String(valor || "").trim().replace(",", "."));
      return Number.isNaN(x) ? 0 : x;
    }

    function esNoValido(total) {
      const t = String(total || "").trim().toUpperCase().replace(",", ".");
      return t === "NPT" || t === "DESC" || t === "" || t === "0" || t === "0.0" || t === "0.00";
    }

    function sumaHoyos(jugador, desde, hasta) {
      let total = 0;
      for (let i = desde; i <= hasta; i++) {
        total += n(jugador["H" + i]);
      }
      return total;
    }

    function valorPrincipal(j) {
      const neto1 = parseNumero(j["NETO 1"]);
      const neto2 = parseNumero(j["NETO 2"]);
      const neto = parseNumero(j.NETO);
      const total = parseNumero(j.TOTAL);

      if (neto1 !== null) return neto1;
      if (neto2 !== null) return neto2;
      if (neto !== null) return neto;
      if (total !== null) return total;
      return 999999;
    }

    function tieneNetoParcial(j) {
      return String(j["NETO 1"] || "").trim() !== "" || String(j["NETO 2"] || "").trim() !== "";
    }

    function compararJugadores(a, b) {
      const aInvalido = esNoValido(a.TOTAL) ? 1 : 0;
      const bInvalido = esNoValido(b.TOTAL) ? 1 : 0;
      if (aInvalido !== bInvalido) return aInvalido - bInvalido;

      const aPrincipal = valorPrincipal(a);
      const bPrincipal = valorPrincipal(b);
      if (aPrincipal !== bPrincipal) return aPrincipal - bPrincipal;

      const aSinParciales = !tieneNetoParcial(a);
      const bSinParciales = !tieneNetoParcial(b);

      if (aSinParciales && bSinParciales) {
        const criterios = [
          [10, 18],
          [13, 18],
          [16, 18],
          [17, 18],
          [18, 18]
        ];

        for (const [desde, hasta] of criterios) {
          const sa = sumaHoyos(a, desde, hasta);
          const sb = sumaHoyos(b, desde, hasta);
          if (sa !== sb) return sa - sb;
        }
      }

      return normalizarTexto(a.JUGADOR).localeCompare(normalizarTexto(b.JUGADOR));
    }

    function urlTarjeta(j) {
      const p = new URLSearchParams();
      p.set("id", j.TORIDD || "");
      p.set("jugador", j.JUGADOR || "");
      p.set("categoria", j.CATEGORIA || "");
      return "tarjeta-beta.html?" + p.toString();
    }

    function splitCSVLine(linea, sep = ";") {
      const out = [];
      let actual = "";
      let enComillas = false;

      for (let i = 0; i < linea.length; i++) {
        const ch = linea[i];
        const next = linea[i + 1];

        if (ch === '"') {
          if (enComillas && next === '"') {
            actual += '"';
            i++;
          } else {
            enComillas = !enComillas;
          }
        } else if (ch === sep && !enComillas) {
          out.push(actual);
          actual = "";
        } else {
          actual += ch;
        }
      }

      out.push(actual);
      return out.map(v => v.trim());
    }

    function limpiarEncabezado(h) {
      return String(h || "")
        .replace(/^\uFEFF/, "")
        .trim();
    }

    function obtener(obj, claves) {
      for (const k of claves) {
        if (obj[k] !== undefined) return obj[k];
      }
      return "";
    }

    async function cargar() {
      try {
        if (!idBuscado) {
          throw new Error('La URL no tiene parámetro "id". Ejemplo: torneo-beta.html?id=123456');
        }

        const resp = await fetch("./RESULTADOS-BETA.csv?v=" + Date.now());
        if (!resp.ok) {
          throw new Error("No se pudo abrir RESULTADOS-BETA.csv");
        }

        let texto = await resp.text();
        texto = texto.replace(/^\uFEFF/, "").replace(/\r/g, "").trim();

        if (!texto) {
          throw new Error("El archivo RESULTADOS-BETA.csv está vacío.");
        }

        const filas = texto.split("\n").filter(f => f.trim() !== "");
        if (filas.length < 2) {
          throw new Error("El CSV no tiene suficientes filas.");
        }

        const encabezados = splitCSVLine(filas.shift(), ";").map(limpiarEncabezado);

        const registros = filas.map(f => {
          const celdas = splitCSVLine(f, ";");
          const obj = {};
          encabezados.forEach((h, i) => {
            obj[h] = (celdas[i] || "").trim();
          });

          if (obj["﻿TORIDD"] && !obj["TORIDD"]) {
            obj["TORIDD"] = obj["﻿TORIDD"];
          }

          return obj;
        });

        const filtrados = registros.filter(r => {
          const torId = String(obtener(r, ["TORIDD", "TORID", "ID"]) || "").trim();
          return torId === idBuscado;
        });

        if (filtrados.length === 0) {
          document.getElementById("titulo").textContent = "Torneo no encontrado";
          document.getElementById("subtitulo").textContent = "";
          document.getElementById("contenido").innerHTML = `<div class="empty">No hay datos para mostrar.</div>`;
          mostrarDebug(
            `No encontré registros con id="${idBuscado}".\n` +
            `Primeros encabezados detectados:\n${encabezados.join(" | ")}`
          );
          return;
        }

        const primero = filtrados[0];
        const torneo = obtener(primero, ["TORNEO", "NOMBRE DEL TORNEO", "NOMBRE"]);
        const fecha = obtener(primero, ["FECHA"]);
        const modalidad = obtener(primero, ["MODALIDAD", "ESTILO DEL TORNEO", "ESTILO", "FORMATO"]);

        document.getElementById("titulo").textContent = torneo || "Resultados del torneo";
        document.getElementById("subtitulo").textContent =
          [fecha, modalidad].filter(Boolean).join(" · ");

        const categorias = {};
        filtrados.forEach(r => {
          const cat = obtener(r, ["CATEGORIA", "CATEGORÍA"]) || "Sin categoría";
          if (!categorias[cat]) categorias[cat] = [];
          categorias[cat].push(r);
        });

        let html = "";

        Object.keys(categorias).forEach(cat => {
          const listaFinal = categorias[cat].slice().sort(compararJugadores);

          html += `<h2 class="categoria">${cat}</h2>`;
          html += `
            <div class="tabla-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>Index</th>
                    <th>Neto 1</th>
                    <th>Neto 2</th>
                    <th>Gross</th>
                    <th>HP</th>
                    <th>Neto</th>
                    <th>Total</th>
                  </tr>
                </thead>
                <tbody>
          `;

          let posicion = 1;

          listaFinal.forEach(j => {
            const invalido = esNoValido(j.TOTAL);
            const posMostrar = invalido ? "" : posicion++;
            const esMatch = coincideBusquedaJugador(j.JUGADOR, busquedaJugador);

            html += `
              <tr class="${invalido ? "novalido" : ""} ${esMatch ? "match match-jugador" : ""}">
                <td>${posMostrar}</td>
                <td class="nombre">
                  <a class="jugador-link" href="${urlTarjeta(j)}">${j.JUGADOR || ""}</a>
                </td>
                <td>${j.INDEX || ""}</td>
                <td>${j["NETO 1"] || ""}</td>
                <td>${j["NETO 2"] || ""}</td>
                <td>${j.GROSS || ""}</td>
                <td>${j.HP || ""}</td>
                <td>${j.NETO || ""}</td>
                <td>${j.TOTAL || ""}</td>
              </tr>
            `;
          });

          html += `
                </tbody>
              </table>
            </div>
          `;
        });

        document.getElementById("contenido").innerHTML = html;

        setTimeout(() => {
          const fila = document.querySelector(".match-jugador");
          if (fila) {
            fila.scrollIntoView({
              behavior: "smooth",
              block: "center"
            });
          }
        }, 300);
      } catch (err) {
        document.getElementById("titulo").textContent = "Error";
        document.getElementById("subtitulo").textContent = err.message;
        document.getElementById("contenido").innerHTML =
          `<div class="empty">No se pudieron cargar los resultados.</div>`;
        mostrarDebug(err.stack || String(err));
      }
    }

    cargar();
  </script>
</body>
</html>
