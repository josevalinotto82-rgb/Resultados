<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneos</title>

<style>
body {font-family: Arial, sans-serif; background:#f5f5f5; margin:0;}
.container {max-width:900px; margin:auto; padding:20px;}
.torneo {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 12px;
}
button {
    padding:8px 12px;
    background:#1e7d3b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    white-space: nowrap;
}
</style>
</head>

<body>

<div class="container">
<h1>Torneos</h1>
<div id="estado">Cargando...</div>
<div id="lista"></div>
</div>

<script>
function normalizarTexto(texto) {
    return (texto || '')
        .trim()
        .toUpperCase()
        .replace(/Á/g, 'A')
        .replace(/É/g, 'E')
        .replace(/Í/g, 'I')
        .replace(/Ó/g, 'O')
        .replace(/Ú/g, 'U')
        .replace(/Ü/g, 'U')
        .replace(/Ñ/g, 'N')
        .replace(/[^A-Z0-9]/g, '');
}

function fechaAId(fecha) {
    // espera dd/mm/yyyy
    const partes = (fecha || '').trim().split('/');
    if (partes.length !== 3) return '';
    const dd = partes[0].padStart(2, '0');
    const mm = partes[1].padStart(2, '0');
    const yyyy = partes[2];
    return `${yyyy}${mm}${dd}`;
}

function construirId(fecha, nombre) {
    return fechaAId(fecha) + "_" + normalizarTexto(nombre);
}

function verTorneo(id){
    window.location.href = "torneo.html?id=" + encodeURIComponent(id);
}

fetch('./INDEX.csv?v=' + Date.now())
.then(res => {
    if (!res.ok) throw new Error('No se pudo abrir INDEX.csv');
    return res.text();
})
.then(data => {
    document.getElementById('estado').innerText = "";

    let filas = data.replace(/\r/g, '').split('\n').slice(1);
    let html = '';

    filas.forEach(fila => {
        let col = fila.split(';');

        if(col.length >= 3){
            let fecha = (col[0] || '').trim();
            let torneo = (col[1] || '').trim();
            let modalidad = (col[2] || '').trim();

            let id = construirId(fecha, torneo);

            html += `
            <div class="torneo">
                <div>
                    <b>${fecha}</b><br>
                    ${torneo}<br>
                    <small>${modalidad}</small>
                </div>
                <button onclick="verTorneo('${id}')">Ver</button>
            </div>
            `;
        }
    });

    document.getElementById('lista').innerHTML = html;
})
.catch(err => {
    document.getElementById('estado').innerText = "Error: " + err.message;
});
</script>

</body>
</html>
