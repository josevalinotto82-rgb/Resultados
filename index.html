<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneos - Villa María Golf</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    /* 🔥 HEADER CLICKEABLE */
    .hero-link {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
    }

    .hero-link:hover {
      opacity: 0.9;
    }

    .escudo {
      height: 64px;
      width: auto;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .escudo:hover {
      transform: scale(1.05);
    }

    .club-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      color: #3e5740;
    }

    .club-subtitle {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 15px;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tools input,
    .tools select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      color: #1f2937;
      outline: none;
    }

    .tools input:focus,
    .tools select:focus {
      border-color: #3e5740;
    }

    .status {
      margin-bottom: 16px;
      color: #6b7280;
      font-size: 14px;
    }

    .lista {
      display: grid;
      gap: 14px;
    }

    .torneo {
      background: white;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .torneo-info {
      flex: 1;
    }

    .fecha {
      display: inline-block;
      font-size: 13px;
      color: #166534;
      background: #dcfce7;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .nombre {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .modalidad {
      color: #6b7280;
      font-size: 15px;
    }

    .ver-btn {
      border: none;
      background: #166534;
      color: white;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .ver-btn:hover {
      background: #14532d;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 920px) {
      .tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .escudo { height: 54px; }
      .club-title { font-size: 21px; }

      .torneo {
        flex-direction: column;
        align-items: stretch;
      }

      .ver-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="hero">
    <a href="https://villamariagolf.com" target="_blank" class="hero-link">
      <img src="escudo.png" class="escudo">
      <div>
        <h1 class="club-title">Villa María Golf</h1>
        <p class="club-subtitle">Resultados de torneos</p>
      </div>
    </a>
  </div>

  <div class="tools">
    <input type="text" id="buscador" placeholder="Buscar torneo o jugador...">
    <select id="filtroAnio">
      <option value="">Todos los años</option>
    </select>
    <select id="filtroDia">
      <option value="">Todos los días</option>
      <option value="0">Domingo</option>
      <option value="1">Lunes</option>
      <option value="2">Martes</option>
      <option value="3">Miércoles</option>
      <option value="4">Jueves</option>
      <option value="5">Viernes</option>
      <option value="6">Sábado</option>
    </select>
  </div>

  <div id="status" class="status">Cargando torneos...</div>
  <div id="lista" class="lista"></div>

</div>

<script>
let torneos = [];
let resultados = [];
let jugadoresIndexados = [];

function normalizar(texto) {
  return texto.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[,.;]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function separar(texto) {
  return normalizar(texto).split(" ").filter(Boolean);
}

function irATorneo(id) {
  const q = document.getElementById("buscador").value;
  window.location.href = "torneo.html?id=" + encodeURIComponent(id) + "&q=" + encodeURIComponent(q);
}

function textoContador(n) {
  return n === 1 ? "1 torneo encontrado" : `${n} torneos encontrados`;
}

function construirIndice() {
  const map = new Map();

  resultados.forEach(r => {
    const nom = normalizar(r.JUGADOR);
    if (!map.has(nom)) map.set(nom, new Set());
    map.get(nom).add(r.ID);
  });

  jugadoresIndexados = Array.from(map.entries());
}

function buscarJugador(texto) {
  const palabras = separar(texto);
  const ids = new Set();

  jugadoresIndexados.forEach(([nombre, lista]) => {
    if (palabras.every(p => nombre.includes(p))) {
      lista.forEach(id => ids.add(id));
    }
  });

  return ids;
}

function render() {
  const texto = document.getElementById("buscador").value;
  const t = normalizar(texto);
  const idsJugador = buscarJugador(texto);

  const filtrados = torneos.filter(x => {
    const matchTexto =
      !t ||
      normalizar(x.TORNEO).includes(t) ||
      normalizar(x.MODALIDAD).includes(t) ||
      idsJugador.has(x.ID);

    return matchTexto;
  });

  document.getElementById("status").textContent = textoContador(filtrados.length);

  document.getElementById("lista").innerHTML = filtrados.map(t => `
    <div class="torneo">
      <div class="torneo-info">
        <div class="fecha">${t.FECHA}</div>
        <div class="nombre">${t.TORNEO}</div>
        <div class="modalidad">${t.MODALIDAD}</div>
      </div>
      <button class="ver-btn" onclick="irATorneo('${t.ID}')">Ver resultados</button>
    </div>
  `).join("");
}

Promise.all([
  fetch("./INDEX.csv?v=" + Date.now()).then(r => r.text()),
  fetch("./RESULTADOS.csv?v=" + Date.now()).then(r => r.text())
]).then(([i, r]) => {

  torneos = i.trim().split("\n").slice(1).map(f => {
    const c = f.split(";");
    return { ID: c[0], FECHA: c[1], TORNEO: c[2], MODALIDAD: c[3] };
  });

  resultados = r.trim().split("\n").slice(1).map(f => {
    const c = f.split(";");
    return { ID: c[0], JUGADOR: c[6] };
  });

  construirIndice();
  render();

  document.getElementById("buscador").addEventListener("input", render);

});
</script>

</body>
</html>
