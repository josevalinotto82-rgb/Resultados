<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneos - Villa María Golf</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f8f3;
      color: #1f2937;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .escudo {
      height: 64px;
      width: auto;
      display: block;
    }

    .club-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      color: #3e5740;
    }

    .club-subtitle {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 15px;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .tools input,
    .tools select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: white;
      color: #1f2937;
      outline: none;
    }

    .tools input:focus,
    .tools select:focus {
      border-color: #3e5740;
    }

    .status {
      margin-bottom: 16px;
      color: #6b7280;
      font-size: 14px;
    }

    .lista {
      display: grid;
      gap: 14px;
    }

    .torneo {
      background: white;
      border-radius: 14px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .torneo-info {
      min-width: 0;
      flex: 1;
    }

    .fecha {
      display: inline-block;
      font-size: 13px;
      color: #166534;
      background: #dcfce7;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .nombre {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .modalidad {
      color: #6b7280;
      font-size: 15px;
    }

    .ver-btn {
      border: none;
      background: #166534;
      color: white;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      font-size: 14px;
    }

    .ver-btn:hover {
      background: #14532d;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    @media (max-width: 920px) {
      .tools {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .container {
        padding: 18px 12px 32px;
      }

      .escudo {
        height: 54px;
      }

      .club-title {
        font-size: 21px;
      }

      .torneo {
        flex-direction: column;
        align-items: stretch;
      }

      .ver-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-top">
        <img src="escudo.png" alt="Escudo Villa María Golf" class="escudo">
        <div>
          <h1 class="club-title">Villa María Golf</h1>
          <p class="club-subtitle">Resultados de torneos</p>
        </div>
      </div>
    </div>

    <div class="tools">
      <input type="text" id="buscador" placeholder="Buscar torneo o jugador...">
      <select id="filtroAnio">
        <option value="">Todos los años</option>
      </select>
      <select id="filtroDia">
        <option value="">Todos los días</option>
        <option value="0">Domingo</option>
        <option value="1">Lunes</option>
        <option value="2">Martes</option>
        <option value="3">Miércoles</option>
        <option value="4">Jueves</option>
        <option value="5">Viernes</option>
        <option value="6">Sábado</option>
      </select>
    </div>

    <div id="status" class="status">Cargando torneos...</div>
    <div id="lista" class="lista"></div>
  </div>

  <script>
    let torneos = [];
    let resultados = [];
    let idsPorJugador = {};

    function extraerAnio(fecha) {
      if (!fecha) return "";
      const partes = fecha.split("/");
      return partes.length === 3 ? partes[2] : "";
    }

    function fechaAObjeto(fecha) {
      if (!fecha) return null;
      const partes = fecha.split("/");
      if (partes.length !== 3) return null;

      const dia = Number(partes[0]);
      const mes = Number(partes[1]) - 1;
      const anio = Number(partes[2]);

      return new Date(anio, mes, dia);
    }

    function obtenerDiaSemana(fecha) {
      const f = fechaAObjeto(fecha);
      if (!f || Number.isNaN(f.getTime())) return "";
      return String(f.getDay());
    }

    function irATorneo(id) {
      window.location.href = "torneo.html?id=" + encodeURIComponent(id);
    }

    function textoContador(cantidad) {
      return cantidad === 1
        ? "1 torneo encontrado"
        : `${cantidad} torneos encontrados`;
    }

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function construirIndiceJugadores() {
      idsPorJugador = {};

      resultados.forEach(r => {
        const jugador = normalizarTexto(r.JUGADOR);
        const id = r.ID;

        if (!jugador || !id) return;

        if (!idsPorJugador[jugador]) {
          idsPorJugador[jugador] = new Set();
        }

        idsPorJugador[jugador].add(id);
      });
    }

    function buscarIdsPorJugador(textoBusqueda) {
      if (!textoBusqueda) return new Set();

      const ids = new Set();

      Object.keys(idsPorJugador).forEach(nombreJugador => {
        if (nombreJugador.includes(textoBusqueda)) {
          idsPorJugador[nombreJugador].forEach(id => ids.add(id));
        }
      });

      return ids;
    }

    function renderTorneos() {
      const textoOriginal = document.getElementById("buscador").value;
      const texto = normalizarTexto(textoOriginal);
      const anio = document.getElementById("filtroAnio").value;
      const dia = document.getElementById("filtroDia").value;
      const lista = document.getElementById("lista");
      const status = document.getElementById("status");

      const idsJugador = buscarIdsPorJugador(texto);

      const filtrados = torneos.filter(t => {
        const torneoTexto = normalizarTexto(t.TORNEO);
        const modalidadTexto = normalizarTexto(t.MODALIDAD);
        const fechaTexto = normalizarTexto(t.FECHA);

        const coincideTextoDirecto =
          !texto ||
          torneoTexto.includes(texto) ||
          modalidadTexto.includes(texto) ||
          fechaTexto.includes(texto);

        const coincideJugador =
          !texto ||
          idsJugador.has(t.ID);

        const coincideBusqueda = !texto || coincideTextoDirecto || coincideJugador;
        const coincideAnio = !anio || extraerAnio(t.FECHA) === anio;
        const coincideDia = !dia || obtenerDiaSemana(t.FECHA) === dia;

        return coincideBusqueda && coincideAnio && coincideDia;
      });

      status.textContent = textoContador(filtrados.length);

      if (filtrados.length === 0) {
        lista.innerHTML = `<div class="empty">No se encontraron torneos con esos filtros.</div>`;
        return;
      }

      lista.innerHTML = filtrados.map(t => `
        <div class="torneo">
          <div class="torneo-info">
            <div class="fecha">${t.FECHA}</div>
            <div class="nombre">${t.TORNEO}</div>
            <div class="modalidad">${t.MODALIDAD}</div>
          </div>
          <button class="ver-btn" onclick="irATorneo('${String(t.ID).replace(/'/g, "\\'")}')">Ver resultados</button>
        </div>
      `).join("");
    }

    Promise.all([
      fetch("./INDEX.csv?v=" + Date.now()).then(r => {
        if (!r.ok) throw new Error("No se pudo abrir INDEX.csv");
        return r.text();
      }),
      fetch("./RESULTADOS.csv?v=" + Date.now()).then(r => {
        if (!r.ok) throw new Error("No se pudo abrir RESULTADOS.csv");
        return r.text();
      })
    ])
    .then(([indexTexto, resultadosTexto]) => {
      const filasIndex = indexTexto.replace(/\r/g, "").trim().split("\n");
      filasIndex.shift();

      torneos = filasIndex
        .filter(f => f.trim() !== "")
        .map(f => {
          const c = f.split(";");
          return {
            ID: (c[0] || "").trim(),
            FECHA: (c[1] || "").trim(),
            TORNEO: (c[2] || "").trim(),
            MODALIDAD: (c[3] || "").trim()
          };
        });

      torneos.sort((a, b) => {
        const da = fechaAObjeto(a.FECHA);
        const db = fechaAObjeto(b.FECHA);
        return db - da;
      });

      const filasResultados = resultadosTexto.replace(/\r/g, "").trim().split("\n");
      filasResultados.shift();

      resultados = filasResultados
        .filter(f => f.trim() !== "")
        .map(f => {
          const c = f.split(";");
          return {
            ID: (c[0] || "").trim(),
            JUGADOR: (c[6] || "").trim()
          };
        });

      construirIndiceJugadores();

      const anios = [...new Set(torneos.map(t => extraerAnio(t.FECHA)).filter(Boolean))]
        .sort((a, b) => b.localeCompare(a));

      const filtroAnio = document.getElementById("filtroAnio");
      filtroAnio.innerHTML += anios.map(a => `<option value="${a}">${a}</option>`).join("");

      document.getElementById("buscador").addEventListener("input", renderTorneos);
      document.getElementById("filtroAnio").addEventListener("change", renderTorneos);
      document.getElementById("filtroDia").addEventListener("change", renderTorneos);

      renderTorneos();
    })
    .catch(err => {
      document.getElementById("status").textContent = "Error: " + err.message;
    });
  </script>
</body>
</html>
