<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneos</title>
<style>
body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }
.torneo {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
}
button {
    padding:8px 12px;
    background:#1e7d3b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    white-space:nowrap;
}
.debug {
    color:#777;
    font-size:12px;
    margin-top:4px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Torneos</h1>
    <div id="estado">Cargando...</div>
    <div id="lista"></div>
</div>

<script>
function normalizarTexto(texto) {
    return (texto || '')
        .trim()
        .toUpperCase()
        .replace(/Á/g, 'A')
        .replace(/É/g, 'E')
        .replace(/Í/g, 'I')
        .replace(/Ó/g, 'O')
        .replace(/Ú/g, 'U')
        .replace(/Ü/g, 'U')
        .replace(/Ñ/g, 'N')
        .replace(/[^A-Z0-9]/g, '');
}

function fechaAId(fecha) {
    const partes = (fecha || '').trim().split('/');
    if (partes.length !== 3) return '';
    const dd = partes[0].padStart(2, '0');
    const mm = partes[1].padStart(2, '0');
    const yyyy = partes[2];
    return yyyy + mm + dd;
}

function construirId(fecha, torneo) {
    return fechaAId(fecha) + "_" + normalizarTexto(torneo);
}

function verTorneo(id) {
    window.location.href = "torneo.html?id=" + encodeURIComponent(id);
}

fetch('./INDEX.csv?v=' + Date.now())
.then(res => {
    if (!res.ok) throw new Error('No se pudo abrir INDEX.csv. HTTP ' + res.status);
    return res.text();
})
.then(data => {
    const filas = data.replace(/\r/g, '').split('\n').slice(1);
    let html = '';

    filas.forEach(fila => {
        if (!fila.trim()) return;

        const col = fila.split(';');

        if (col.length >= 3) {
            const fecha = (col[0] || '').trim();
            const torneo = (col[1] || '').trim();
            const modalidad = (col[2] || '').trim();
            const id = construirId(fecha, torneo);

            html += `
                <div class="torneo">
                    <div>
                        <b>${fecha}</b><br>
                        ${torneo}<br>
                        <small>${modalidad}</small>
                        <div class="debug">ID armado: ${id}</div>
                    </div>
                    <button onclick="verTorneo('${id}')">Ver</button>
                </div>
            `;
        }
    });

    document.getElementById('estado').innerText = '';
    document.getElementById('lista').innerHTML = html;
})
.catch(err => {
    document.getElementById('estado').innerText = 'Error: ' + err.message;
});
</script>

</body>
</html>
